services:
  #(1) Flask 서비스
  web:
    image: gonas0919/my-ncp:latest
    container_name: flask_app
    expose:
      - "5000"
    restart: always

  #(2) Nginx 서비스
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: always
